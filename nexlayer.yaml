application:
  name: openfga
  pods:
  - name: app
    image: mirror.gcr.io/openfga/openfga:latest
    path: /healthz
    servicePorts:
    - 8080
    command: /openfga run
    vars:
      OPENFGA_DATASTORE_ENGINE: memory
      OPENFGA_HTTP_ADDR: "0.0.0.0:8080"
      OPENFGA_GRPC_ADDR: "0.0.0.0:8081"
