application:
  name: openfga
  pods:
  - name: openfga
    image: ghcr.io/openfga/openfga:latest
    command: run
    path: /healthz
    servicePorts:
    - 8080
    vars:
      OPENFGA_PLAYGROUND_ENABLED: "true"
      OPENFGA_DATASTORE_ENGINE: memory
      OPENFGA_HTTP_ADDR: "0.0.0.0:8080"
      OPENFGA_GRPC_ADDR: "0.0.0.0:8081"
      OPENFGA_LOG_FORMAT: text
